<head>
<meta charset="UTF-8" />

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6f7f9;
  --surface:#ffffff;
  --border:#e0e0e0;
  --text:#1a1a1a;
  --muted:#888;
  --faint:#bbb;
  --chip:#f1f1f1;
  --radius-sm:8px;
  --radius-md:12px;
  --radius-pill:99px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#111113;
    --surface:#1c1c1e;
    --border:#2e2e30;
    --text:#f0f0f0;
    --muted:#888;
    --faint:#555;
    --chip:#2a2a2c;
  }
}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
  line-height:1.6;
}
.app{max-width:560px;margin:0 auto;padding:1.25rem 1rem 3rem}
.header{display:flex;align-items:baseline;gap:8px;margin-bottom:1.25rem}
.header h1{font-size:20px;font-weight:700;letter-spacing:-0.3px}
.header span{font-size:13px;color:var(--muted)}

.filter-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:1rem 1.125rem;margin-bottom:1rem}
.filter-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px}
.filter-pills{display:flex;flex-wrap:wrap;gap:6px}
.filter-pill{
  font-size:13px;padding:5px 12px;border-radius:var(--radius-pill);
  background:var(--chip);color:var(--muted);border:1px solid var(--border);
  cursor:pointer;transition:transform .12s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.filter-pill:hover{transform:scale(1.05)}
.filter-pill:active{transform:scale(.95)}
.filter-pill.active{background:var(--text);color:var(--bg);border-color:var(--text)}

.preview{
  border-radius:var(--radius-md);height:70px;margin-bottom:1.25rem;
  border:1px solid var(--border);background:var(--chip);
  display:flex;align-items:center;padding:0 1.125rem;overflow:hidden;
  transition:background .25s;
}
.preview img{
  width:70px;height:70px;object-fit:cover;
  border-radius:var(--radius-sm) 0 0 var(--radius-sm);
  margin:-1px 12px -1px -1.125rem;flex-shrink:0;
}
.preview-text{font-size:13px;color:var(--muted)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:1rem 1.125rem;margin-bottom:.75rem}
.card-header{display:flex;align-items:center;gap:14px}
.thumb{width:52px;height:52px;flex-shrink:0;border-radius:var(--radius-sm);border:1px solid var(--border);object-fit:cover;background:var(--chip)}
.kit-name{font-size:16px;font-weight:600}
.kit-sub{font-size:12px;color:var(--muted);margin-top:2px}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.tag{font-size:11px;padding:3px 9px;border-radius:var(--radius-pill);background:var(--chip);border:1px solid var(--border);color:var(--muted)}

.accordion-toggle{margin-top:12px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);-webkit-tap-highlight-color:transparent}
.accordion-toggle:hover{color:var(--text)}
.accordion-content{margin-top:12px;border-top:1px solid var(--border);padding-top:14px;display:none}
.accordion-content.open{display:block}
.kit-tagline{font-size:13px;color:var(--muted);margin-bottom:14px}
.view-link{
  display:inline-block;font-size:13px;font-weight:600;
  color:var(--text);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:7px 14px;
  text-decoration:none;-webkit-tap-highlight-color:transparent;
}
.view-link:hover{border-color:var(--muted)}

.footer-note{font-size:12px;color:var(--muted);text-align:center;padding:10px 12px;background:var(--chip);border-radius:var(--radius-sm)}
.footer-note a{color:var(--text)}
.empty{font-size:14px;color:var(--faint);text-align:center;padding:1.5rem 0}
</style>
</head>

  }
];

const CATEGORIES = ["All","Nature","Garden","Food","Travel","Animals","Art","Sports","Music","Love","Occasions"];
let active = "All";

const fEl = document.getElementById("filters");
CATEGORIES.forEach(c => {
  const b = document.createElement("button");
  b.className = "filter-pill" + (c === "All" ? " active" : "");
  b.textContent = c;
  b.onclick = () => {
    active = c;
    document.querySelectorAll(".filter-pill").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
  fEl.appendChild(b);
});

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const list = KITS.filter(k => active === "All" || k.category === active);
  if (!list.length) {
    grid.innerHTML = '<div class="empty">No kits in this category.</div>';
    return;
  }
  list.forEach((k, i) => {
    const card = document.createElement("div");
    card.className = "card";
    const uid = "acc-" + i + "-" + k.name.replace(/\W/g, "");
    const imgTag = k.img
      ? `<img class="thumb" src="${k.img}" alt="${k.name}" />`
      : `<div class="thumb"></div>`;
    card.innerHTML = `
      <div class="card-header">
        ${imgTag}
        <div>
          <div class="kit-name">${k.name}</div>
          <div class="kit-sub">${k.category}</div>
          <div class="tag-row"><span class="tag">${k.category}</span></div>
        </div>
      </div>
      <div class="accordion-toggle" data-id="${uid}" data-img="${k.img}" data-name="${k.name}">View details →</div>
      <div class="accordion-content" id="${uid}">
        <p class="kit-tagline">${k.tagline}</p>
        <a class="view-link" href="${k.url}" target="_blank">View on website ↗</a>
      </div>`;
    grid.appendChild(card);
  });

  document.querySelectorAll(".accordion-toggle").forEach(btn => {
    btn.addEventListener("click", () => {
      const el = document.getElementById(btn.dataset.id);
      const open = el.classList.toggle("open");
      btn.textContent = open ? "Hide details ↑" : "View details →";
      if (open) {
        const prev = document.getElementById("preview");
        if (btn.dataset.img) {
          prev.innerHTML = `<img src="${btn.dataset.img}" alt="${btn.dataset.name}" /><span class="preview-text">${btn.dataset.name}</span>`;
        } else {
          prev.innerHTML = `<span class="preview-text">${btn.dataset.name}</span>`;
        }
      }
    });
  });
}

render();
