<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Kit Finder | Creatis</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f6f7f9;
  --surface: #ffffff;
  --border: #e0e0e0;
  --text: #1a1a1a;
  --muted: #888;
  --faint: #bbb;
  --chip: #f1f1f1;
  --info-bg: #eff6ff;
  --info-border: #93c5fd;
  --info-text: #1d4ed8;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-pill: 99px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111113;
    --surface: #1c1c1e;
    --border: #2e2e30;
    --text: #f0f0f0;
    --muted: #888;
    --faint: #555;
    --chip: #2a2a2c;
    --info-bg: #1e2d45;
    --info-border: #3b6cb7;
    --info-text: #93c5fd;
  }
}

html { -webkit-text-size-adjust: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
  line-height: 1.6;
}

.app {
  max-width: 560px;
  margin: 0 auto;
  padding: 1.25rem 1rem 3rem;
}

.header {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 1.25rem;
}
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.header span { font-size: 13px; color: var(--muted); }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 1rem 1.125rem;
  margin-bottom: 1rem;
}

.section-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 12px;
}

.chip-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 8px;
}

.chip {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  padding: 9px 10px;
  border-radius: var(--radius-pill);
  background: var(--chip);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all .15s ease;
  white-space: nowrap;
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
}
.chip:hover { border-color: var(--muted); }
.chip:active { opacity: 0.7; }
.chip.active {
  background: var(--info-bg);
  border-color: var(--info-border);
  color: var(--info-text);
}

.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 1rem 1.125rem;
  margin-bottom: 1rem;
  display: none;
}

.kit-item {
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.kit-item:last-child { border-bottom: none; padding-bottom: 0; }
.kit-item:first-child { padding-top: 0; }

.kit-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--info-text);
  text-decoration: none;
}
.kit-name:hover { text-decoration: underline; }

.kit-tag {
  font-size: 13px;
  color: var(--muted);
  margin-top: 3px;
}

.footer-note {
  font-size: 12px;
  color: var(--muted);
  text-align: center;
  padding: 10px 12px;
  background: var(--chip);
  border-radius: var(--radius-sm);
}
.footer-note a { color: var(--info-text); }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>Kit Finder</h1>
    <span>by Creatis</span>
  </div>

  <div class="card">
    <div class="section-label">What are they most into?</div>
    <div class="chip-grid" id="chipGroup"></div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="section-label">Available kits</div>
    <div id="kitOutput"></div>
  </div>

</div>
<script>
const kitMap = {
  Nature: { kits: [
    { name: "Wild Flower Block Kit", tagline: "For nature-lovers who notice every leaf, petal, and sky shift.", url: "https://onedayinnovember.in/products/wild-flower-block-kit" },
    { name: "Petal Embroidery Kit",  tagline: "Slow, meditative stitching inspired by floral forms — expressive, tactile, and deeply calming.", url: "https://onedayinnovember.in/products/petal-embroidery-kit" }
  ]},
  Garden: { kits: [
    { name: "Sprig Block Kit", tagline: "For those who love plants, slow mornings, and green corners.", url: "https://onedayinnovember.in/products/sprig-block-kit" },
    { name: "Pea Embroidery Kit", tagline: "Delicate, playful stitching inspired by peas, climbing vines, and gentle garden rhythms.", url: "https://onedayinnovember.in/products/pea-embroidery-kit" }
  ]},
  Food: { kits: [
    { name: "Lemon Block Kit",    tagline: "Bright, zesty, and perfect for food lovers.", url: "https://onedayinnovember.in/products/lemon-block-kit" },
    { name: "Lemon Embroidery Kit", tagline: "A little zest, a little stitch, and a whole lot of charm.", url: "https://onedayinnovember.in/products/lemon-embroidery-kit" },
    { name: "Cupcake Block Kit",  tagline: "Playful, sweet, and full of celebratory charm.", url: "https://onedayinnovember.in/products/cupcake-block-kit" },
    { name: "Popsicle Block Kit", tagline: "Bold, graphic, and nostalgic — summer captured in print.", url: "https://onedayinnovember.in/products/popsicle-block-kit" },
    { name: "Orange Block Kit",   tagline: "Juicy, graphic forms inspired by fruit, colour, and everyday abundance.", url: "https://onedayinnovember.in/products/orange-block-kit" }
  ]},
  Travel: { kits: [
    { name: "Wave Block Kit",     tagline: "For travellers who collect moments, not magnets.", url: "https://onedayinnovember.in/products/wave-block-kit" },
    { name: "Mountain Block Kit", tagline: "Quiet, expansive forms inspired by landscapes, journeys, and open horizons.", url: "https://onedayinnovember.in/products/mountain-block-kit" }
  ]},
  Animals: { kits: [
    { name: "Tiger Block Kit",    tagline: "Bold, expressive, and full of character.", url: "https://onedayinnovember.in/products/tiger-block-kit" },
    { name: "Monkey Block Kit",   tagline: "Playful, curious, and full of movement — perfect for spirited makers.", url: "https://onedayinnovember.in/products/monkey-block-kit" },
    { name: "Peacock Block Kit",  tagline: "Elegant, detailed, and richly patterned — a celebration of beauty and form.", url: "https://onedayinnovember.in/products/peacock-block-kit" },
    { name: "Elephant Block Kit", tagline: "Strong, steady, and symbolic — grounded motifs with quiet presence.", url: "https://onedayinnovember.in/products/elephant-block-kit" }
  ]},
  Art: { kits: [
    { name: "Cypress Block Kit", tagline: "Graceful, sculptural forms inspired by botanical studies and timeless pattern.", url: "https://onedayinnovember.in/products/cypress-block-kit" }
  ]},
  Sports: { kits: [
    { name: "Tennis Block Kit", tagline: "Clean lines, rhythm, and energy.", url: "https://onedayinnovember.in/products/tennis-block-kit" }
  ]},
  Music: { kits: [
    { name: "Piano Block Kit", tagline: "For music lovers drawn to rhythm, repetition, and quiet harmony.", url: "https://onedayinnovember.in/products/piano-block-kit" }
  ]},
  Love: { kits: [
    { name: "Hearts Block Set",  tagline: "A classic motif for love in all its forms — warm, personal, and timeless.", url: "https://onedayinnovember.in/products/hearts-block-set" },
    { name: "Garland Block Set", tagline: "Flowing forms that celebrate connection, rituals, and togetherness.", url: "https://onedayinnovember.in/products/garland-block-set" },
    { name: "Rose Block Kit",    tagline: "Romantic, expressive florals that speak quietly of care and affection.", url: "https://onedayinnovember.in/products/rose-block-kit" }
  ]},
  Occasions: { kits: [
    { name: "Valentine's Day Block Kit", tagline: "A thoughtful, hands-on way to mark love, connection, and shared moments.", url: "https://onedayinnovember.in/products/rose-block-kit" },
    { name: "Mother's Day Block Kit",    tagline: "A gentle, meaningful gift — made slowly, with care and gratitude.", url: "https://onedayinnovember.in/products/sprig-block-kit" }
  ]}
};

const group      = document.getElementById("chipGroup");
const resultCard = document.getElementById("resultCard");
const kitOutput  = document.getElementById("kitOutput");
let activeChip   = null;

Object.keys(kitMap).forEach(key => {
  const el = document.createElement("div");
  el.className = "chip";
  el.textContent = key;
  el.addEventListener("click", () => {
    if (activeChip) activeChip.classList.remove("active");
    el.classList.add("active");
    activeChip = el;
    const kits = kitMap[key].kits;
    kitOutput.innerHTML = kits.map(k => `
      <div class="kit-item">
        <a class="kit-name" href="${k.url}" target="_blank">${k.name}</a>
        <div class="kit-tag">${k.tagline}</div>
      </div>`).join("");
    resultCard.style.display = "block";
  });
  group.appendChild(el);
});
</script>
</body>
</html>
